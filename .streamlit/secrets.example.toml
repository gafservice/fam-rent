# Copie este archivo como .streamlit/secrets.toml para pruebas locales.
# Nunca suba secrets.toml a GitHub.

[email]
usuario = "admin@vigias.net"
password = "CONTRASENA_DE_APLICACION"
smtp_server = "smtp.gmail.com"
smtp_port = 587

[gcp_service_account]
type = "service_account"
project_id = "SU_PROYECTO"
private_key_id = "SU_PRIVATE_KEY_ID"
private_key = """-----BEGIN PRIVATE KEY-----
SU_CLAVE_PRIVADA
-----END PRIVATE KEY-----
"""
client_email = "cuenta-servicio@proyecto.iam.gserviceaccount.com"
client_id = "SU_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "SU_URL_CERTIFICADO"
universe_domain = "googleapis.com"
